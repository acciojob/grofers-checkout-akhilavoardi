<table>
    <tr>
        <td class="item">A</td>
        <td class="prices">10</td>
    </tr>
    <tr>
        <td class="item">B</td>
        <td class="prices">20</td>
    </tr>
    <tr>
        <td class="item">C</td>
        <td class="prices">30</td>
    </tr>
    <tr>
        <td class="item">D</td>
        <td class="prices">40</td>
    </tr>
    <tr>
        <td class="item">E</td>
        <td class="prices">50</td>
    </tr>
</table>

<button onclick="calculateTotal()">Calculate</button>

<div id="ans"></div>

<script>
function calculateTotal() {
    let total = 0;

    document.querySelectorAll(".prices").forEach(cell => {
        total += parseInt(cell.textContent, 10) || 0;
    });

    document.getElementById("ans").textContent = total;
}
</script>
