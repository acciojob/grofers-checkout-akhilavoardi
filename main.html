<table>
    <tr>
        <td class="item">A</td>
        <td class="prices">10</td>
    </tr>
    <tr>
        <td class="item">B</td>
        <td class="prices">20</td>
    </tr>
    <tr>
        <td class="item">C</td>
        <td class="prices">30</td>
    </tr>
    <tr>
        <td class="item">D</td>
        <td class="prices">40</td>
    </tr>
    <tr>
        <td class="item">E</td>
        <td class="prices">50</td>
    </tr>
</table>

<button onclick="calculateTotal()">Calculate</button>

<div id="ans"></div>

<script>
function calculateTotal() {
    const prices = document.querySelectorAll(".prices");
    let total = 0;

    prices.forEach(cell => {
        const matches = cell.textContent.match(/\d+/g);
        if (matches) {
            total += Number(matches[matches.length - 1]);
        }
    });

    document.getElementById("ans").textContent = total;
}
</script>
